  type: text
  content: "[\r

    \    {\r

    \t\t\"class\": \"MonitorEvent\",\r

    \t\t\"severity\": \"OK\",\r

    \t\t\"msg\": \"Control-M Agent Host: Disk >90%\",\r

    \        \"source_identifier\": \"se-preprod-aapi.us1\",\r

    \t\t\"source_hostname\": \"se-preprod-aapi.us1\"\r

    \t}\r

    ]"
examples: ./.resources/CreateEvent Control-M Event (clear).resources/examples
order: 5000
