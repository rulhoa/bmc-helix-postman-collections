    \    \"advanceFilter\": {\r

    \        \"name\": \"Control-M Jobs\",\r

    \        \"eventClass\": \"CTM_JOB\",\r

    \        \"status\": \"OPEN,ACK,ASSIGNED,BLACKOUT,CLOSED\",\r

    \        \"severity\": \"CRITICAL,MAJOR,MINOR,WARNING,INFO\",\r

    \        \"filterConditions\": [\r

